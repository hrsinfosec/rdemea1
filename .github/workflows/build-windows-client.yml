name: Build RustDesk Windows Client

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout RustDesk
        uses: actions/checkout@v4
        with:
          repository: rustdesk/rustdesk
          submodules: recursive
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.75.0

      - name: Install rustfmt
        shell: bash
        run: rustup component add rustfmt --toolchain 1.75.0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7
          cache: true

      - name: Install bridge generator
        shell: bash
        run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --locked

      - name: Inject custom client settings
        shell: bash
        env:
          RENDEZVOUS_SERVER: ${{ vars.RENDEZVOUS_SERVER }}
          RELAY_SERVER: ${{ vars.RELAY_SERVER }}
          HIDE_NETWORK_SETTINGS: ${{ vars.HIDE_NETWORK_SETTINGS }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          rendezvous = os.environ["RENDEZVOUS_SERVER"]
          relay = os.environ["RELAY_SERVER"]
          key = os.environ["RS_PUB_KEY"]

          candidates = [
              Path("src/common.rs"),
              Path("libs/hbb_common/src/config.rs"),
          ]

          for p in candidates:
              if not p.exists():
                  continue
              s = p.read_text(encoding="utf-8")

              replacements = {
                  'pub fn get_custom_rendezvous_server() -> String { String::new() }':
                      f'pub fn get_custom_rendezvous_server() -> String {{ "{rendezvous}".to_string() }}',
                  'pub fn get_custom_relay_server() -> String { String::new() }':
                      f'pub fn get_custom_relay_server() -> String {{ "{relay}".to_string() }}',
                  'pub fn get_custom_key() -> String { String::new() }':
                      f'pub fn get_custom_key() -> String {{ "{key}".to_string() }}',
                  'pub const RENDEZVOUS_SERVERS: &str = "";':
                      f'pub const RENDEZVOUS_SERVERS: &str = "{rendezvous}";',
                  'pub const RELAY_SERVERS: &str = "";':
                      f'pub const RELAY_SERVERS: &str = "{relay}";',
                  'pub const RS_PUB_KEY: &str = "";':
                      f'pub const RS_PUB_KEY: &str = "{key}";',
              }

              changed = False
              for old, new in replacements.items():
                  if old in s:
                      s = s.replace(old, new)
                      changed = True

              if changed:
                  p.write_text(s, encoding="utf-8")
          PY

      - name: Prepare Flutter packages
        shell: bash
        run: |
          cd flutter
          flutter pub get

      - name: Generate bridge files
        shell: bash
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./src/bridge_generated.rs

      - name: Build Windows client
        shell: bash
        run: |
          cd flutter
          flutter build windows --release

      - name: Package artifact
        shell: bash
        run: |
          powershell -Command "Compress-Archive -Path flutter/build/windows/x64/runner/Release/* -DestinationPath rustdesk-windows-client.zip -Force"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-client
          path: rustdesk-windows-client.zip
